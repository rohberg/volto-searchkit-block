services:
  ingest:
    image: ghcr.io/collective/collective.elastic.ingest:latest
    environment:
      MAPPINGS_FILE: configuration/mappings.json
      ANALYSIS_FILE: configuration/analysis.json
      PREPROCESSINGS_FILE: configuration/preprocessings.json
      INDEX_SERVER: opensearch:9200
      INDEX_OPENSEARCH: 1
      INDEX_USE_SSL: 1
      INDEX_LOGIN: ${INDEX_LOGIN?unset}
      INDEX_PASSWORD: ${INDEX_PASSWORD?unset}
      CELERY_BROKER: redis://redis:6379/0
      CELERY_CONCURRENCY: 1
      CELERY_LOGLEVEL: info
      PLONE_SERVICE: ${PLONE_SERVICE:-http://host.docker.internal:8080}
      PLONE_SITE_PREFIX_PATH: ${PLONE_SITE_PREFIX_PATH:-Plone}
      PLONE_USER: ${PLONE_USER?unset}
      PLONE_PASSWORD: ${PLONE_PASSWORD?unset}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - ./ingest-configuration:/configuration

  redis:
    image: 'redis:latest'
    ports:
      - 6379:6379

  opensearch:
    build:
      context: ./
      dockerfile: ./Dockerfile.opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - 'OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx2g'
      # - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${INDEX_PASSWORD?unset}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - 9200:9200 # REST API
      - 9600:9600 # Performance Analyzer
    tty: true

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    ports:
      - 5601:5601
    expose:
      - '5601'
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'

